<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루룽 롤링페이퍼</title>
    
    <link rel="icon" href="images.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1 class="logo">롤링페이퍼</h1>
    </header>

    <main id="board"></main>

    <button id="add-btn" onclick="openModal()">+</button>

    <div id="modal" class="modal-overlay">
        <div class="modal-window">
            <h2>메시지 남기기</h2>
            <input type="text" id="note-title" placeholder="제목 또는 이름 (필수)">
            <textarea id="note-content" rows="5" placeholder="내용 입력"></textarea>
            
            <label for="note-image" class="file-label" style="display: block; margin: 10px 0; cursor: pointer;">📷 사진 첨부</label>
            <input type="file" id="note-image" accept="image/*" style="display: none;">
            <p id="file-name" style="font-size: 12px; color: #666;"></p>

            <div class="btn-group" style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="submit-btn" onclick="addNote()" style="flex: 1; padding: 10px; background: #ff5252; color: white; border: none; border-radius: 5px; cursor: pointer;">완료</button>
                <button class="cancel-btn" onclick="closeModal()" style="flex: 1; padding: 10px; background: #eee; border: none; border-radius: 5px; cursor: pointer;">취소</button>
            </div>
        </div>
    </div>

    <div id="alert-modal" class="black-confirm-overlay">
        <div class="black-confirm-window">
            <p id="alert-message"></p>
            <div style="text-align: right;">
                <button onclick="closeAlert()" style="padding: 5px 15px; cursor: pointer;">확인</button>
            </div>
        </div>
    </div>

    <div id="delete-confirm-modal" class="black-confirm-overlay">
        <div class="black-confirm-window">
            <p>정말 이 메모를 지울까요?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="confirmDelete()" style="flex: 1; padding: 10px; background: #ff5252; color: white; border: none; border-radius: 5px; cursor: pointer;">삭제</button>
                <button onclick="closeDeleteConfirm()" style="flex: 1; padding: 10px; background: #eee; border: none; border-radius: 5px; cursor: pointer;">취소</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
